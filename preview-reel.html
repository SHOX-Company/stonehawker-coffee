<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velo Brasa — Hero Ad Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: Georgia, 'Times New Roman', serif;
      color: #D4A52E;
    }

    .label {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 24px;
    }

    .phone-frame {
      position: relative;
      width: min(360px, 90vw);
      aspect-ratio: 9 / 16;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(212,165,46,0.2),
        0 32px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(212,165,46,0.06);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .download-btn {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: 1px solid rgba(212,165,46,0.4);
      border-radius: 3px;
      color: #D4A52E;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s;
    }

    .download-btn:hover {
      background: rgba(212,165,46,0.08);
      border-color: rgba(212,165,46,0.7);
    }

    .download-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .meta {
      margin-top: 16px;
      font-size: 10px;
      letter-spacing: 2px;
      opacity: 0.3;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <p class="label">Velo Brasa &mdash; Hero Ad v1</p>

  <div class="phone-frame">
    <video
      src="/videos/velo-brasa-hero-ad-v1.mp4"
      controls
      autoplay
      loop
      muted
      playsinline>
    </video>
  </div>

  <a class="download-btn" href="/videos/velo-brasa-hero-ad-v1.mp4" download="velo-brasa-hero-ad-v1.mp4">
    <svg viewBox="0 0 16 16"><path d="M8 12L3 7h3V2h4v5h3L8 12zm-6 2h12v1.5H2V14z"/></svg>
    Download MP4
  </a>

  <p class="meta">720 &times; 1280 &nbsp;&bull;&nbsp; 9:16 &nbsp;&bull;&nbsp; 6.06s &nbsp;&bull;&nbsp; 3.5 MB</p>

</body>
</html>
